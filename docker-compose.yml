services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-coffee}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-coffee}
      POSTGRES_DB: ${DB_NAME:-coffee}
    ports:
      - "8788:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-coffee}"]
      interval: 5s
      timeout: 3s
      retries: 5

  stripe-cli:
    image: stripe/stripe-cli
    command: listen --forward-to http://host.docker.internal:8787/api/webhooks/stripe
    env_file:
      - .env
    # `stripe listen` in test mode requires an unrestricted secret key. If STRIPE_API_KEY is a
    # restricted key, set STRIPE_CLI_API_KEY to the standard test secret key (Dashboard → API keys).
    environment:
      STRIPE_API_KEY: ${STRIPE_CLI_API_KEY:-${STRIPE_API_KEY}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - stripe

  app:
    build: .
    ports:
      - "8789:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg-data:
